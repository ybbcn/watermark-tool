name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build with Next.js
        run: npm run build
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: watermark-tool
          directory: frontend/.vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
          compatibilityFlags: 'nodejs_compat'

      # ✅ 部署后使用 wrangler CLI 设置配置
      - name: Configure Cloudflare Pages via wrangler
        run: |
          npm install -g wrangler
          
          echo "🔧 Setting secrets..."
          echo "${{ secrets.GOOGLE_CLIENT_ID }}" | wrangler pages secret put GOOGLE_CLIENT_ID --project-name=watermark-tool
          echo "${{ secrets.GOOGLE_CLIENT_SECRET }}" | wrangler pages secret put GOOGLE_CLIENT_SECRET --project-name=watermark-tool
          echo "${{ secrets.AUTH_SECRET }}" | wrangler pages secret put AUTH_SECRET --project-name=watermark-tool
          
          echo "🔧 Configuring D1 database..."
          # 使用 wrangler 配置 D1 绑定
          cat > wrangler.toml << EOF
          name = "watermark-tool"
          pages_build_output_dir = ".vercel/output/static"
          
          [[d1_databases]]
          binding = "DB"
          database_name = "watermark-tool-db"
          database_id = "7607e1d1-9605-4588-a486-9e7da2cdc749"
          EOF
          
          wrangler pages project update watermark-tool --config wrangler.toml || echo "Note: wrangler update failed, D1 may need manual config"
          
          echo "✅ Configuration complete!"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
