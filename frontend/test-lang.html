<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语言切换测试</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1 id="title">语言切换测试</h1>
    
    <button onclick="i18n.toggleLang()" id="lang-switcher">English</button>
    <button onclick="showState()">显示当前状态</button>
    
    <div class="result">
        <p><strong>当前语言:</strong> <span id="current-lang">-</span></p>
        <p><strong>标题翻译:</strong> <span id="title-translation">-</span></p>
        <p><strong>按钮文本:</strong> <span id="button-text">-</span></p>
    </div>

    <script src="js/i18n.js"></script>
    <script>
        function showState() {
            document.getElementById('current-lang').textContent = i18n.currentLang;
            document.getElementById('title-translation').textContent = i18n.t('tab.addText');
            document.getElementById('button-text').textContent = document.getElementById('lang-switcher').textContent;
        }
        
        // 页面加载后显示状态
        window.addEventListener('load', function() {
            setTimeout(showState, 100);
        });
    </script>
</body>
</html>
